name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Check agent syntax
        run: node --check Sources/QuietMenuBar/Resources/pi-agent/server.mjs

      - name: Build Swift package
        run: swift build

      - name: Audit production Node dependencies
        run: npm audit --omit=dev --registry=https://registry.npmjs.org
